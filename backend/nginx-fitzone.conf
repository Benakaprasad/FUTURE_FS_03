# ─────────────────────────────────────────────────────────────
#  Nginx Reverse Proxy — FitZone Gym CRM
#  File: /etc/nginx/sites-available/fitzone
#
#  Features:
#   • Upstream connection pooling (keepalive)
#   • Gzip + Brotli compression
#   • Static-asset caching (7-day browser cache)
#   • SSE / long-poll support for /api/notifications/stream
#   • Security headers
#   • Rate limiting zones
#   • SSL/TLS termination (certbot / Let's Encrypt)
#   • HTTP → HTTPS redirect
# ─────────────────────────────────────────────────────────────

# ── Rate-limit zones (defined in http context, but shown here for clarity) ──
# Add these inside your /etc/nginx/nginx.conf  http { } block:
#
#   limit_req_zone $binary_remote_addr zone=api_global:10m  rate=60r/m;
#   limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=10r/m;

# ── Upstream Pool ─────────────────────────────────────────────
upstream fitzone_backend {
    # Single Node process.  For PM2 cluster mode add one line per worker:
    #   server 127.0.0.1:3001;
    #   server 127.0.0.1:3002;
    server 127.0.0.1:3000;

    # Keep up to 32 idle connections to Node alive — avoids TCP handshake
    # overhead on every request.
    keepalive 32;

    # Health-check: remove a backend from rotation if /health fails.
    # (Requires nginx-plus or nginx_upstream_check_module for OSS Nginx)
    # check interval=3000 rise=2 fall=3 timeout=1000 type=http;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS Main Server ─────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ── TLS Certificates (managed by Certbot) ──────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── TLS Hardening ──────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;
    resolver                  8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout          5s;

    # ── Security Headers ───────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"                                    always;
    add_header X-Content-Type-Options    "nosniff"                                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"      always;

    # Hide Nginx version
    server_tokens off;

    # ── Client / Request Limits ────────────────────────────────
    client_max_body_size    10m;   # matches Express body limit
    client_body_timeout     12s;
    client_header_timeout   12s;
    send_timeout            15s;
    keepalive_timeout       65s;

    # ── Gzip Compression ───────────────────────────────────────
    gzip               on;
    gzip_vary          on;
    gzip_proxied       any;
    gzip_comp_level    5;          # sweet-spot: speed vs ratio
    gzip_min_length    256;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml image/svg+xml font/woff font/woff2;

    # ── Static Frontend Assets ─────────────────────────────────
    # If Node serves the frontend, Nginx can serve /assets directly
    # from disk — much faster than proxying to Node.
    # Adjust the path to match your build output directory.
    location /assets/ {
        root        /var/www/fitzone/frontend/dist;
        access_log  off;
        expires     7d;
        add_header  Cache-Control "public, immutable";
        add_header  Vary "Accept-Encoding";

        # Brotli (if ngx_brotli module is installed)
        # brotli     on;
        # brotli_comp_level 6;
        # brotli_types text/css application/javascript application/json font/woff2;
    }

    # ── Auth API — stricter rate limit ─────────────────────────
    location /api/auth/ {
        limit_req zone=api_auth burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://fitzone_backend;
        include            /etc/nginx/proxy_params;  # see snippet below
    }

    # ── SSE / Notification Stream — no buffering, no timeout ───
    location /api/notifications/stream {
        proxy_pass              http://fitzone_backend;
        proxy_http_version      1.1;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;

        # SSE-critical: disable all buffering so events arrive instantly
        proxy_buffering         off;
        proxy_cache             off;
        proxy_read_timeout      3600s;   # keep stream open for up to 1 hour
        proxy_send_timeout      3600s;
        chunked_transfer_encoding on;

        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Accel-Buffering "no";
    }

    # ── Health / Readiness — bypass rate limiting ───────────────
    location ~ ^/(health|ready)$ {
        proxy_pass         http://fitzone_backend;
        access_log         off;  # don't pollute logs with probe traffic
        include            /etc/nginx/proxy_params;
    }

    # ── General API ────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_global burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://fitzone_backend;
        include            /etc/nginx/proxy_params;
    }

    # ── SPA Fallback (if Nginx serves frontend directly) ───────
    # Uncomment if you move static serving fully to Nginx:
    # location / {
    #     root   /var/www/fitzone/frontend/dist;
    #     index  index.html;
    #     try_files $uri $uri/ /index.html;
    #     expires 1h;
    # }

    # ── Proxy all other traffic to Node ────────────────────────
    location / {
        proxy_pass http://fitzone_backend;
        include    /etc/nginx/proxy_params;
    }

    # ── Block hidden files / dot-files ─────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}