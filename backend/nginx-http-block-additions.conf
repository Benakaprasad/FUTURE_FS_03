# ─────────────────────────────────────────────────────────────
#  Add these lines inside the  http { }  block of your
#  /etc/nginx/nginx.conf  (BEFORE the include sites-enabled line)
# ─────────────────────────────────────────────────────────────

# Rate-limit zones
# $binary_remote_addr uses 7–8 bytes vs 46 for $remote_addr → more efficient
limit_req_zone $binary_remote_addr zone=api_global:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=api_auth:10m   rate=10r/m;

# Return JSON for rate-limit errors (not Nginx default HTML page)
limit_req_log_level warn;

# Connection limiting (optional — prevent slowloris-style attacks)
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
limit_conn conn_limit 20;

# ── Performance Tuning ─────────────────────────────────────────
# (also in http { } block)
sendfile           on;
tcp_nopush         on;
tcp_nodelay        on;
keepalive_timeout  65;
types_hash_max_size 2048;

# Increase open file cache (important for static asset serving)
open_file_cache          max=1000 inactive=20s;
open_file_cache_valid    30s;
open_file_cache_min_uses 2;
open_file_cache_errors   on;